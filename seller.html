<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Seller</title><link rel="stylesheet" href="styles.css" /></head><body>
<div class="market-strip"><div class="container strip-inner"><a href="#">SAVE MORE ON APP</a><a href="seller.html">SELL ON LAZADA</a><a href="#">CUSTOMER CARE</a><a href="#">TRACK MY ORDER</a><a href="customer.html#login">LOGIN</a><a href="customer.html#signup">SIGN UP</a></div></div>
<header class="lazada-head"><div class="container head-inner"><div class="brand"><a href="index.html">Lazada</a></div><input class="search-input" placeholder="Search in Lazada" /><button class="search-btn">Search</button><nav class="nav-links light"><a href="index.html">Dashboard</a><a href="customer.html">Customer</a><a href="seller.html">Seller</a><a href="admin.html">Admin</a><a href="rider.html">Rider</a></nav></div></header>
<div class="container grid grid-2"><section class="card"><h2>Seller Verification Registration</h2><input id="sellerName" placeholder="Name" /><input id="sellerAddress" placeholder="Seller Address" /><input id="sellerPicture" placeholder="Picture URL/path" /><button id="saveSellerProfile">Submit Seller Profile</button><div class="meta" id="sellerVerifyStatus"></div><h3>List Product</h3><input id="prodName" placeholder="Product name" /><div class="row"><input id="prodQty" type="number" min="1" placeholder="Quantity" /><input id="prodPrice" type="number" min="1" placeholder="Price" /></div><select id="prodCategory"><option value="">Category</option><option value="mobiles">mobiles</option><option value="men tshirts">men tshirts</option><option value="women shirts">women shirts</option><option value="dresses">dresses</option><option value="wireless buds">wireless buds</option></select><input id="prodImage" placeholder="Product image URL/path" /><button id="addProduct">Add Product</button></section><section class="card"><h2>Orders and Sales</h2><h3>Pending Orders</h3><div id="sellerPendingOrders" class="list"></div><h3>Products Sold (with reviews)</h3><div id="sellerSoldOrders" class="list"></div><h3>Notifications</h3><div id="sellerNotifications" class="list"></div></section></div>
<script src="app.js"></script><script>
const data=getData(); function hydrate(){el("sellerName").value=data.seller.profile.name||"";el("sellerAddress").value=data.seller.profile.address||"";el("sellerPicture").value=data.seller.profile.picture||"";el("sellerVerifyStatus").textContent=data.seller.verified?"Seller is verified by admin.":"Seller is not yet verified.";}
function renderOrders(){const pending=data.orders.filter((o)=>o.status==="customer_checkout");const sold=data.orders.filter((o)=>o.receivedByCustomer);renderList("sellerPendingOrders",pending,(o)=>`<div class="item"><strong>${o.productName}</strong><div class="meta">Price: ₱${Number(o.price).toFixed(2)}</div><button data-accept="${o.id}">Accept</button><button class="danger" data-decline="${o.id}">Decline</button></div>`);renderList("sellerSoldOrders",sold,(o)=>`<div class="item"><strong>${o.productName}</strong><div class="meta">Status: ${o.status}</div><div class="meta">Review: ${o.review?`${o.review.comment} (${o.review.image||"no image"})`:"No review yet"}</div></div>`);document.querySelectorAll("[data-accept]").forEach((btn)=>btn.addEventListener("click",()=>{const order=data.orders.find((o)=>o.id===btn.dataset.accept);if(!order)return;order.sellerAccepted=true;order.status="seller_accepted_waiting_admin";pushNotification(data,"admin",`Seller accepted order for ${order.productName}.`);saveData(data);renderOrders();}));document.querySelectorAll("[data-decline]").forEach((btn)=>btn.addEventListener("click",()=>{data.orders=data.orders.filter((o)=>o.id!==btn.dataset.decline);saveData(data);renderOrders();}));}
el("saveSellerProfile").addEventListener("click",()=>{data.seller.profile={name:el("sellerName").value.trim(),address:el("sellerAddress").value.trim(),picture:el("sellerPicture").value.trim()};data.seller.verified=false;pushNotification(data,"admin","Seller submitted profile for verification.");saveData(data);hydrate();});
el("addProduct").addEventListener("click",()=>{if(!data.seller.verified){alert("Product listing is allowed only after admin verifies seller.");return;}const product={id:id("p"),name:el("prodName").value.trim(),quantity:Number(el("prodQty").value||0),price:Number(el("prodPrice").value||0),category:el("prodCategory").value,image:el("prodImage").value.trim()};if(!product.name||!product.quantity||!product.price||!product.category)return;data.seller.products.push(product);saveData(data);alert("Product listed.");el("prodName").value="";el("prodQty").value="";el("prodPrice").value="";el("prodCategory").value="";el("prodImage").value="";});
hydrate();renderOrders();renderNotifications("sellerNotifications","seller",data);
</script></body></html>
