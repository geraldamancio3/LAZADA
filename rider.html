<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Rider</title><link rel="stylesheet" href="styles.css" /></head><body>
<div class="market-strip"><div class="container strip-inner"><a href="#">SAVE MORE ON APP</a><a href="seller.html">SELL ON LAZADA</a><a href="#">CUSTOMER CARE</a><a href="#">TRACK MY ORDER</a><a href="customer.html#login">LOGIN</a><a href="customer.html#signup">SIGN UP</a></div></div>
<header class="lazada-head"><div class="container head-inner"><div class="brand"><a href="index.html">Lazada</a></div><input class="search-input" placeholder="Search in Lazada" /><button class="search-btn">Search</button><nav class="nav-links light"><a href="index.html">Dashboard</a><a href="customer.html">Customer</a><a href="seller.html">Seller</a><a href="admin.html">Admin</a><a href="rider.html">Rider</a></nav></div></header>
<div class="container grid grid-2"><section class="card"><h2>Rider Registration</h2><input id="riderName" placeholder="Rider name" /><input id="riderMobile" placeholder="Rider mobile" /><button id="saveRider">Register Rider</button><div id="riderStatus" class="meta"></div></section><section class="card"><h2>Assigned Deliveries</h2><div id="riderOrders" class="list"></div><h3>Notifications</h3><div id="riderNotifications" class="list"></div></section></div>
<script src="app.js"></script><script>
const data=getData();
function hydrate(){el("riderName").value=data.rider.profile.name||"";el("riderMobile").value=data.rider.profile.mobile||"";el("riderStatus").textContent=data.rider.available?"Rider registered and available.":"No rider registered yet.";}
function renderDeliveries(){const assigned=data.orders.filter((o)=>o.status==="rider_assigned_waiting_accept"||o.status==="rider_accepted_on_delivery");renderList("riderOrders",assigned,(o)=>`<div class="item"><strong>${o.productName}</strong><div class="meta">Status: ${o.status}</div>${o.status==="rider_assigned_waiting_accept"?`<button data-accept="${o.id}">Accept Delivery</button><button class="danger" data-reject="${o.id}">Reject Delivery</button>`:""}${o.status==="rider_accepted_on_delivery"?`<button data-done="${o.id}">Confirm Delivery Done</button>`:""}</div>`);document.querySelectorAll("[data-accept]").forEach((btn)=>btn.addEventListener("click",()=>{const order=data.orders.find((o)=>o.id===btn.dataset.accept);if(!order)return;order.riderAccepted=true;order.status="rider_accepted_on_delivery";saveData(data);renderDeliveries();}));document.querySelectorAll("[data-reject]").forEach((btn)=>btn.addEventListener("click",()=>{const order=data.orders.find((o)=>o.id===btn.dataset.reject);if(!order)return;order.status="admin_approved_waiting_rider";order.riderId="";saveData(data);renderDeliveries();}));document.querySelectorAll("[data-done]").forEach((btn)=>btn.addEventListener("click",()=>{const order=data.orders.find((o)=>o.id===btn.dataset.done);if(!order)return;order.delivered=true;order.status="delivered_waiting_customer_confirmation";pushNotification(data,"customer",`Delivery arrived for ${order.productName}. Please confirm receipt.`);saveData(data);renderDeliveries();}));}
el("saveRider").addEventListener("click",()=>{data.rider.profile={name:el("riderName").value.trim(),mobile:el("riderMobile").value.trim()};data.rider.available=Boolean(data.rider.profile.name);saveData(data);hydrate();renderDeliveries();});
hydrate();renderDeliveries();renderNotifications("riderNotifications","rider",data);
</script></body></html>
