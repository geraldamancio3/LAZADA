<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Admin</title><link rel="stylesheet" href="styles.css" /></head><body>
<div class="market-strip"><div class="container strip-inner"><a href="#">SAVE MORE ON APP</a><a href="seller.html">SELL ON LAZADA</a><a href="#">CUSTOMER CARE</a><a href="#">TRACK MY ORDER</a><a href="customer.html#login">LOGIN</a><a href="customer.html#signup">SIGN UP</a></div></div>
<header class="lazada-head"><div class="container head-inner"><div class="brand"><a href="index.html">Lazada</a></div><input class="search-input" placeholder="Search in Lazada" /><button class="search-btn">Search</button><nav class="nav-links light"><a href="index.html">Dashboard</a><a href="customer.html">Customer</a><a href="seller.html">Seller</a><a href="admin.html">Admin</a><a href="rider.html">Rider</a></nav></div></header>
<div class="container grid grid-2"><section class="card"><h2>Seller Verification</h2><div id="sellerProfileView" class="item"></div><button id="verifySeller">Verify Seller</button></section><section class="card"><h2>Order Approvals / Rider Appointment</h2><div id="adminOrders" class="list"></div><h3>Notifications</h3><div id="adminNotifications" class="list"></div></section></div>
<script src="app.js"></script><script>
const data=getData();
function renderSellerCard(){const p=data.seller.profile||{};el("sellerProfileView").innerHTML=p.name?`<div><strong>${p.name}</strong></div><div class="meta">${p.address||""}</div><div class="meta">${p.picture||"No picture provided"}</div><div class="meta">Status: ${data.seller.verified?"Verified":"Not Verified"}</div>`:`<div class="empty">No seller registration yet.</div>`;}
function renderOrders(){const pending=data.orders.filter((o)=>o.status==="seller_accepted_waiting_admin"||o.status==="admin_approved_waiting_rider");renderList("adminOrders",pending,(o)=>`<div class="item"><strong>${o.productName}</strong><div class="meta">Status: ${o.status}</div>${o.status==="seller_accepted_waiting_admin"?`<button data-approve="${o.id}">Approve Order</button>`:""}${o.status==="admin_approved_waiting_rider"&&data.rider.available?`<button data-assign="${o.id}">Appoint Rider</button>`:""}${o.status==="admin_approved_waiting_rider"&&!data.rider.available?`<div class="warning">No rider registered yet.</div>`:""}${o.receivedByCustomer?`<div class="status">Customer received product.</div>`:""}</div>`);document.querySelectorAll("[data-approve]").forEach((btn)=>btn.addEventListener("click",()=>{if(!data.seller.verified){alert("Order can be approved only if seller is verified.");return;}const order=data.orders.find((o)=>o.id===btn.dataset.approve);if(!order)return;order.adminApproved=true;order.status="admin_approved_waiting_rider";pushNotification(data,"rider",`New delivery assignment available for ${order.productName}.`);saveData(data);renderOrders();}));document.querySelectorAll("[data-assign]").forEach((btn)=>btn.addEventListener("click",()=>{const order=data.orders.find((o)=>o.id===btn.dataset.assign);if(!order)return;order.riderId=data.rider.profile.name||"registered rider";order.status="rider_assigned_waiting_accept";data.rider.assignments.push(order.id);saveData(data);renderOrders();}));}
el("verifySeller").addEventListener("click",()=>{if(!data.seller.profile.name)return;data.seller.verified=true;pushNotification(data,"seller","Admin verified your seller account.");saveData(data);renderSellerCard();renderOrders();renderNotifications("adminNotifications","admin",data);});
renderSellerCard();renderOrders();renderNotifications("adminNotifications","admin",data);
</script></body></html>
